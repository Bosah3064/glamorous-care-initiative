name: glamorous_care_app
description: Flutter companion app for Glamorous Care Initiative
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/hero.png
    - assets/gallery4.jpg
    - assets/chairman.jpg
    - assets/treasurer.jpg
    - assets/vice-chair.jpg
    - assets/education.png
    - assets/food.png
    - assets/health.png

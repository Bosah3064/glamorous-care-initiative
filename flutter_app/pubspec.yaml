name: glamorous_care_app
description: Flutter companion app for Glamorous Care Initiative
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.16.0
  flutter_dotenv: ^5.0.2
  google_fonts: ^6.1.0
  confetti: ^0.8.0
  screenshot: ^3.0.0
  path_provider: ^2.1.6
  audioplayers: ^6.7.1
  share_plus: ^13.2.0
  shared_preferences: ^2.5.5
  pdf: ^3.12.0
  flutter_tts: ^4.2.5
  http: ^1.2.0

dependency_overrides:
  sign_in_with_apple: ^8.1.0
  sign_in_with_apple_platform_interface: ^2.0.0
  sign_in_with_apple_web: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/sounds/
    - assets/logo.png
    - assets/hero.png
    - assets/gallery4.jpg
    - assets/chairman.jpg
    - assets/treasurer.jpg
    - assets/vice-chair.jpg
    - assets/education.png
    - assets/food.png
    - assets/health.png
